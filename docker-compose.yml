services:
  mongo:
    image: mongo:6.0
    container_name: mongo_dacn
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: strong_password
    ports:
      - "27019:27017"   # nếu bạn muốn truy cập từ host bằng 27019
    networks:
      - be_net

  backend:
    container_name: be_dacn
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production

      # ✅ Connect nội bộ qua network bằng tên service "mongo"
      MONGODB_URI: mongodb://admin:strong_password@mongo:27017/DAChuyenNganh?authSource=admin

      JWT_SECRET: super_secret_key
      JWT_EXPIRES_IN: 7d
    depends_on:
      - mongo
    networks:
      - be_net

networks:
  be_net:
    driver: bridge
